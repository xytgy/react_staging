<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>前端路由的基石_history</title>
</head>
<body>
	<a href="http://www.atguigu.com" onclick="return push(event, '/test1') ">push test1</a><br><br>
	<button onclick="push(event, '/test2')">push test2</button><br><br>
	<button onclick="replace(event, '/test3')">replace test3</button><br><br>
	<button onclick="back()">⇐ 回退</button>
	<button onclick="forward()">前进 ⇒</button>

	<script type="text/javascript" src="https://unpkg.com/history@4.7.2/umd/history.min.js"></script>
	<script type="text/javascript">
		// 为了防止脚本加载失败导致报错，增加初始化检查
		let h;
		if (typeof History !== 'undefined') {
			h = History.createHashHistory() 
			
			h.listen((location) => {
				console.log('请求路由路径变化了', location)
				// 同时更新页面显示，以便观察效果
				document.getElementById('current-path').innerText = '当前路径: ' + location.pathname
			})
		} else {
			alert('history.js 库加载失败，请检查网络或更换 CDN')
		}

		function push (event, path) {
			if (event) event.preventDefault(); // 显式阻止默认跳转
			if (h) {
				h.push(path)
			} else {
				console.error('history 实例未初始化');
			}
			return false // 确保返回 false
		}

		

		function back() {
			if (h) h.goBack()
		}

		function forward() {
			if (h) h.goForward()
		}
	</script>
	<hr>
	<div id="current-path">当前路径: /</div>
</body>
</html>
